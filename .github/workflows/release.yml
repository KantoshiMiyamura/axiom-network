name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build (e.g. v1.0.0). Must already exist and be signed.'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Experimental crates excluded from the testnet node release path.
  # See ci.yml for the full rationale: desktop wallet (Tauri) is not in
  # this release, and the community crates pull rand 0.9.2 (RUSTSEC-2026-0097).
  # Re-include them here once both gates are resolved.
  WORKSPACE_EXCLUDES: >-
    --exclude axiom-desktop-wallet
    --exclude axiom-community-shared
    --exclude axiom-community-server
    --exclude axiom-community-client

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Node CLI binaries — 4 platforms
  # ──────────────────────────────────────────────────────────────────────────
  build-node:
    name: Node ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-pc-windows-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # macOS targets temporarily disabled for testnet releases:
          #   • aarch64-apple-darwin — macos-14 runner exited 101 during
          #     `cargo build` (toolchain pin unresolved on Apple Silicon)
          #   • x86_64-apple-darwin  — macos-13 hosted-runner queue stalled
          #     past 40 min on prior tag (v1.0.1-testnet.2), blocking publish
          # Re-enable both once a working toolchain + runner combo is confirmed.
          # Tracked in the release runbook (docs/RELEASE_CHECKLIST.md).

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-*) ;;
            *) echo "::error::invalid tag '$TAG'"; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}

      - name: Verify tag points to HEAD and is annotated
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "::error::Tag $TAG ($TAG_COMMIT) does not match HEAD ($HEAD_COMMIT)"
            exit 1
          fi
          TYPE=$(git cat-file -t "$TAG")
          if [ "$TYPE" != "tag" ]; then
            echo "::error::Tag $TAG is not annotated (type=$TYPE). Use: git tag -s $TAG -m ..."
            exit 1
          fi

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        shell: bash
        # axiom-cli produces: axiom, axiom-node, axiom-keygen, axiom-bump-fee.
        # axiom-signer produces: axiom-sign. The library crate axiom-node is a
        # transitive dependency of axiom-cli — no separate -p needed.
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p axiom-cli \
            -p axiom-signer

      - name: Run tests
        shell: bash
        run: cargo test --release --workspace ${{ env.WORKSPACE_EXCLUDES }} --lib --target ${{ matrix.target }}

      - name: Stage artifacts
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          STAGE="axiom-v${VERSION}-${{ matrix.name }}"
          mkdir -p "$STAGE/tools"
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi

          # Primary entry point — the only binary most users need.
          src="target/${{ matrix.target }}/release/axiom${EXT}"
          if [ -f "$src" ]; then
            cp "$src" "$STAGE/"
          else
            echo "::error::missing binary: $src"
            exit 1
          fi

          # Internal binaries — kept for advanced users + tooling, but moved
          # under tools/ so the archive root stays uncluttered for newcomers.
          for bin in axiom-node axiom-keygen axiom-sign axiom-bump-fee; do
            src="target/${{ matrix.target }}/release/${bin}${EXT}"
            if [ -f "$src" ]; then
              cp "$src" "$STAGE/tools/"
            else
              echo "::error::missing binary: $src"
              exit 1
            fi
          done

          # Quick-start guide. Plain text so it opens in Notepad / any editor.
          cat > "$STAGE/README.txt" <<EOF
          Axiom Network ${TAG}
          Post-quantum Layer 1 blockchain — runs on your machine.

          ─────────────────────────────────────────────────────────────
          QUICK START
          ─────────────────────────────────────────────────────────────

          1. Open a terminal in this folder.

          2. Run:

                 axiom mine

             That command creates your wallet, starts a node, and
             begins mining on your own chain. You are mining.

          3. Anytime, in another terminal:

                 axiom status        — node + chain status
                 axiom wallet balance — your balance
                 axiom               — quick-start menu

          ─────────────────────────────────────────────────────────────
          DATA LOCATION
          ─────────────────────────────────────────────────────────────

          Your wallet and chain data live in the OS data directory:
              Linux:    ~/.local/share/axiom
              macOS:    ~/Library/Application Support/axiom
              Windows:  %APPDATA%\axiom

          Use --data-dir DIR to override.

          ─────────────────────────────────────────────────────────────
          JOINING A KNOWN PEER
          ─────────────────────────────────────────────────────────────

          At startup, pass one or more --peer flags:

              axiom mine --peer HOST:9000 --peer OTHER:9000

          ─────────────────────────────────────────────────────────────
          CONNECT WITH A FRIEND (NODE ALREADY RUNNING)
          ─────────────────────────────────────────────────────────────

          1. Find your public address:

                 axiom myip

             That prints something like:

                 Your public address:
                   203.0.113.5:9000

          2. Send that address to your friend (any messenger).

          3. Your friend, on their machine, runs:

                 axiom connect 203.0.113.5:9000

          4. Confirm the link:

                 axiom status

             The PEERS section lists every connected peer.

          NETWORKING NOTES
          - Inbound connections require TCP port 9000 to be reachable
            from the internet. On home networks that means a router
            port-forward (or UPnP enabled on your router).
          - If a friend cannot reach you, flip the roles: they share
            their public address with `axiom myip`, you run
            `axiom connect <their-ip>:9000` from your end.

          ─────────────────────────────────────────────────────────────
          ADVANCED
          ─────────────────────────────────────────────────────────────

          Internal binaries are under tools/:
              tools/axiom-node       direct full-node binary
              tools/axiom-keygen     standalone keypair generator
              tools/axiom-sign       offline transaction signer
              tools/axiom-bump-fee   replace-by-fee helper

          Most users do not need these. The 'axiom' wrapper covers the
          common workflow.

          ─────────────────────────────────────────────────────────────
          BUILD INFO
          ─────────────────────────────────────────────────────────────

          Target: ${{ matrix.target }}
          Commit: ${GITHUB_SHA}
          Built:  $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Verify before running: see SHA256SUMS + SHA256SUMS.minisig
          on the GitHub release page.
          EOF

          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:STAGE/*" -DestinationPath "$env:STAGE.zip" -Force

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.name }}
          path: |
            axiom-v*-${{ matrix.name }}.zip
            axiom-v*-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Desktop wallet installers — Tauri
  # Disabled for testnet releases: node-only ship. Re-enable by setting
  # `if: true` once the wallet is ready for public distribution.
  # ──────────────────────────────────────────────────────────────────────────
  build-wallet:
    if: false
    name: Wallet ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-msi
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - name: linux-appimage
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - name: linux-deb
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - name: macos-dmg
            os: macos-14
            target: aarch64-apple-darwin
            bundle: dmg

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wallet/package-lock.json

      - name: Install Linux bundler deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev patchelf

      - name: Install Tauri CLI
        run: cargo install --locked --version ^2 tauri-cli

      - name: Install wallet dependencies
        working-directory: wallet
        run: npm ci

      - name: Build wallet installer (${{ matrix.bundle }})
        working-directory: wallet
        shell: bash
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Collect installer
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          VERSION="${TAG#v}"
          OUT="wallet-installers"
          mkdir -p "$OUT"
          BUNDLE_ROOT="target/${{ matrix.target }}/release/bundle"
          case "${{ matrix.bundle }}" in
            msi)      find "$BUNDLE_ROOT/msi"      -name "*.msi"      -exec cp {} "$OUT/" \; ;;
            appimage) find "$BUNDLE_ROOT/appimage" -name "*.AppImage" -exec cp {} "$OUT/" \; ;;
            deb)      find "$BUNDLE_ROOT/deb"      -name "*.deb"      -exec cp {} "$OUT/" \; ;;
            dmg)      find "$BUNDLE_ROOT/dmg"      -name "*.dmg"      -exec cp {} "$OUT/" \; ;;
          esac
          ls -lh "$OUT/"
          if [ -z "$(ls -A "$OUT")" ]; then
            echo "::error::no installer produced for ${{ matrix.bundle }}"
            exit 1
          fi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: wallet-${{ matrix.name }}
          path: wallet-installers/*
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Aggregate: download all artifacts, produce SHA256SUMS, sign, upload release
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    # Node-only release: `build-wallet` is gated off (see its `if: false`).
    # Restore `build-wallet` here when re-enabling wallet installers.
    needs: [build-node]
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw

      - name: Flatten artifact tree
        run: |
          set -eu
          mkdir -p dist
          find dist-raw -type f -exec cp -v {} dist/ \;
          ls -lh dist/

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -eu
          # Hash every regular file except any prior SHA256SUMS to avoid self-reference.
          rm -f SHA256SUMS SHA256SUMS.minisig
          sha256sum * | sort -k 2 > SHA256SUMS
          cat SHA256SUMS

      - name: Install minisign (pinned 0.12 from upstream)
        # Ubuntu's apt repository does not ship a `minisign` package on
        # ubuntu-22.04, so install the official binary tarball directly from
        # the upstream GitHub release. Version is pinned for reproducibility
        # — bump deliberately, not implicitly.
        run: |
          set -eu
          MINISIGN_VERSION="0.12"
          MINISIGN_URL="https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz"
          curl -fsSL "$MINISIGN_URL" -o minisign.tar.gz
          tar -xzf minisign.tar.gz
          sudo install -m 755 "minisign-linux/x86_64/minisign" /usr/local/bin/minisign
          rm -rf minisign.tar.gz minisign-linux
          minisign -v

      - name: Sign SHA256SUMS with minisign
        env:
          MINISIGN_SECRET_KEY_B64: ${{ secrets.MINISIGN_SECRET_KEY_B64 }}
          MINISIGN_PASSWORD:       ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -eu
          if [ -z "${MINISIGN_SECRET_KEY_B64:-}" ] || [ -z "${MINISIGN_PASSWORD:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY_B64 and MINISIGN_PASSWORD must be configured as repo secrets"
            exit 1
          fi
          # Decode the base64-encoded secret key into a file with strict perms.
          # Base64 wrapping avoids GitHub Actions multiline-secret mangling
          # (CRLF/whitespace) that produced "Error while loading the secret key file".
          KEYFILE="$(mktemp)"
          chmod 600 "$KEYFILE"
          # `-d` decodes; trailing/leading whitespace and newlines from the secret
          # are tolerated by base64. Output goes only to the file, never to stdout.
          printf '%s' "$MINISIGN_SECRET_KEY_B64" | base64 -d > "$KEYFILE"
          # Sanity-check: minisign secret keys begin with "untrusted comment:".
          # If decoding produced garbage, fail loudly without printing the bytes.
          if ! head -c 18 "$KEYFILE" | grep -q '^untrusted comment'; then
            echo "::error::decoded secret key does not look like a minisign key (header check failed)"
            rm -f "$KEYFILE"
            exit 1
          fi
          # Feed passphrase on stdin; never echo it.
          printf '%s\n' "$MINISIGN_PASSWORD" \
            | minisign -S -s "$KEYFILE" -m dist/SHA256SUMS -x dist/SHA256SUMS.minisig
          # Best-effort wipe of the key file; GitHub also destroys the runner after.
          if command -v shred >/dev/null 2>&1; then shred -u "$KEYFILE" || rm -f "$KEYFILE"; else rm -f "$KEYFILE"; fi
          ls -lh dist/SHA256SUMS*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
