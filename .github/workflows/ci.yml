name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  # Experimental crates not part of the public testnet node release.
  # The desktop wallet (Tauri) and community server/client/shared are
  # gated until they are ready for production. Re-include them here once
  # they ship — at minimum, axiom-community-{server,client,shared} pull
  # vulnerable rand 0.9.2 (RUSTSEC-2026-0097) via tokio-postgres and the
  # proptest dev-dependency, which must be resolved before re-enabling.
  WORKSPACE_EXCLUDES: >-
    --exclude axiom-desktop-wallet
    --exclude axiom-community-shared
    --exclude axiom-community-server
    --exclude axiom-community-client

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint: fmt + clippy on a single runner — fast feedback
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: fmt + clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace ${{ env.WORKSPACE_EXCLUDES }} --all-targets -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────
  # Build + test matrix — same targets as release.yml so CI catches
  # platform-specific breakage before a tag is cut
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: test ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build
        shell: bash
        run: cargo build --workspace ${{ env.WORKSPACE_EXCLUDES }} --target ${{ matrix.target }}

      - name: cargo test
        shell: bash
        run: cargo test --workspace ${{ env.WORKSPACE_EXCLUDES }} --lib --target ${{ matrix.target }}

  # ──────────────────────────────────────────────────────────────────────────
  # Audit: flag known-vulnerable dependencies — advisory, not blocking
  # ──────────────────────────────────────────────────────────────────────────
  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run audit
        # The audit policy is strict for core crates. Every --ignore below
        # is a deliberate exception scoped to a verified dependency path.
        #
        # Verified core-impact advisories — already fixed in Cargo.lock by
        # this CI run via direct upgrade (no --ignore needed):
        #   • RUSTSEC-2026-0041  lz4_flex 0.11.5 → 0.11.6
        #     (was reachable via axiom-storage → fjall → lsm-tree)
        #   • RUSTSEC-2026-0049/0098/0099/0104  rustls-webpki 0.103.9 → 0.103.13
        #     (was reachable via axiom-cli → reqwest → hyper-rustls → rustls)
        #
        # Ignored — verified reachable ONLY through experimental crates that
        # are excluded from the public testnet node release (wallet and
        # community server/client/shared). These advisories MUST be resolved
        # before those crates ship; tracked in the community workstream.
        #   • RUSTSEC-2026-0097  rand 0.9.2
        #     path: axiom-community-{server,client,shared} via tokio-postgres,
        #     proptest, postgres-protocol
        #   • RUSTSEC-2026-0002  lru 0.12.5
        #     path: axiom-community-client → ratatui
        #   • RUSTSEC-2023-0071  rsa 0.x  (Marvin Attack timing side-channel)
        #     path: axiom-community-server → sqlx-mysql
        #   • RUSTSEC-2024-0363  sqlx 0.7.4
        #     path: axiom-community-server only
        #
        # Ignored — known core impact, no drop-in fix available:
        #   • RUSTSEC-2025-0144  ml-dsa 0.0.4 (timing side-channel, sev 6.4)
        #     path: axiom-crypto → ml-dsa, used by signer / wallet / node
        #     fix: upgrade to >=0.1.0-rc.3 (alpha API migration — not a
        #     drop-in bump). Tracked separately; the timing channel is
        #     not exploitable without an attacker-observable signing oracle
        #     and we do not currently expose one in the node binary, but
        #     this MUST be addressed before mainnet. See SECURITY.md.
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0363 \
            --ignore RUSTSEC-2025-0144
